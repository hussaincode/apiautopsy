name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/hussaincode/apiautopsy-backend
  AZURE_CONTAINER_APP_NAME: apiautopsy-backend
  AZURE_RESOURCE_GROUP: apiautopsy-rg
  AZURE_CREDENTIALS_PRESENT: ${{ secrets.AZURE_CREDENTIALS != '' && 'true' || 'false' }}

jobs:
  build-and-deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn -B verify

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Validate Azure deployment secrets
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_CLIENT_ID: ${{ secrets.APIAUTOPSYBACKEND_AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.APIAUTOPSYBACKEND_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.APIAUTOPSYBACKEND_AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          if [ -z "$AZURE_CREDENTIALS" ] && { [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ]; }; then
            echo "::error::Missing Azure login secrets. Add AZURE_CREDENTIALS JSON, or add APIAUTOPSYBACKEND_AZURE_CLIENT_ID, APIAUTOPSYBACKEND_AZURE_TENANT_ID, and APIAUTOPSYBACKEND_AZURE_SUBSCRIPTION_ID."
            missing=1
          fi
          exit "$missing"

      - name: Login to Azure with credentials JSON
        if: ${{ env.AZURE_CREDENTIALS_PRESENT == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure with OIDC
        if: ${{ env.AZURE_CREDENTIALS_PRESENT != 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ env.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              --revision-suffix "git-${GITHUB_SHA::7}"

            az containerapp show \
              --name "${{ env.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query "{name:name,latestRevision:properties.latestRevisionName,image:properties.template.containers[0].image,traffic:properties.configuration.ingress.traffic}" \
              --output table
