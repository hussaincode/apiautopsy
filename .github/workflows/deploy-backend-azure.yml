name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-azure.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/hussaincode/apiautopsy-backend
  AZURE_CREDENTIALS_PRESENT: ${{ secrets.AZURE_CREDENTIALS != '' && 'true' || 'false' }}

jobs:
  build-and-deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn -B test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Login to Azure
        if: ${{ env.AZURE_CREDENTIALS_PRESENT == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container Apps
        if: ${{ env.AZURE_CREDENTIALS_PRESENT == 'true' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --image "${{ env.IMAGE_NAME }}:${{ github.sha }}"
