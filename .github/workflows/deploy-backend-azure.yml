name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/hussaincode/apiautopsy-backend

jobs:
  build-and-deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn -B test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Validate Azure deployment secrets
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          missing=0
          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::Missing GitHub secret AZURE_CREDENTIALS. Image was pushed to GHCR, but Azure deployment cannot run."
            missing=1
          fi
          if [ -z "$AZURE_CONTAINER_APP_NAME" ]; then
            echo "::error::Missing GitHub secret AZURE_CONTAINER_APP_NAME."
            missing=1
          fi
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "::error::Missing GitHub secret AZURE_RESOURCE_GROUP."
            missing=1
          fi
          exit "$missing"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              --revision-suffix "git-${GITHUB_SHA::7}"

            az containerapp show \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --query "{name:name,latestRevision:properties.latestRevisionName,image:properties.template.containers[0].image,traffic:properties.configuration.ingress.traffic}" \
              --output table
