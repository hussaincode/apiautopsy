name: Build and Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Build Docker image
        run: docker build -t apiautopsy-backend:${{ github.sha }} .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  deploy-hooks:
    name: Free-tier deploy hooks
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render backend deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Vercel frontend deploy
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
