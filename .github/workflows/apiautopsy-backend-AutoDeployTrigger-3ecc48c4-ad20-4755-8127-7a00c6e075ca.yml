name: Trigger auto deployment for apiautopsy-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/apiautopsy-backend-AutoDeployTrigger-3ecc48c4-ad20-4755-8127-7a00c6e075ca.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APIAUTOPSYBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.APIAUTOPSYBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.APIAUTOPSYBACKEND_REGISTRY_PASSWORD }}
          containerAppName: apiautopsy-backend
          resourceGroup: apiautopsy-rg
          imageToBuild: ghcr.io/apiautopsy-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


