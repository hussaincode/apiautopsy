server:
  port: ${PORT:8080}
spring:
  application:
    name: apiautopsy
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/apiautopsy}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:apiautopsy}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:apiautopsy}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  quartz:
    job-store-type: memory
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled-google-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled-google-secret}
            scope: openid,email,profile
app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32}
    ttl-minutes: ${JWT_TTL_MINUTES:10080}
  crypto:
    secret: ${CRYPTO_SECRET:change-me-change-me-change-me-change-me-32}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://apiautopsy.com,https://www.apiautopsy.com}
  scheduler:
    poll-ms: ${SCHEDULER_POLL_MS:30000}
logging:
  level:
    org.springframework.security: INFO
management:
  endpoints:
    web:
      exposure:
        include: health
